<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Ms+Madi&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Borel&display=swap" rel="stylesheet">

  <title>Meditation Bell</title>

  <style>
    html, body {
      height: 100%;
      margin: 0;
      background: #000;
      display: grid;
      place-items: center;
      /* font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; */
      /* font-family: "Ms Madi", cursive; */
      font-family: "Borel", cursive !important;
    }
    button {
      appearance: none;
      border: 1px solid #333;
      background: #616161;
      color: #fff;
      padding: 18px 28px;
      font-size: 18px;
      border-radius: 12px;
      cursor: pointer;
      opacity: 0.5;
      transition: opacity 2s linear;
      font-family: inherit !important;
    }
    button:disabled {
      /* opacity: 0.55; */
      cursor: default;
    }
    button.fadeout {
      opacity: 0;
    }
    button.fadein {
      opacity: 0.55;
      background: #000000;
      border: 1px solid #000000;
      transition: opacity 5s linear
    }
    .top-image {
      max-width: 750px;
      width: 90vw;
      height: auto;
      border-radius: 16px;
      margin-bottom: 20px;
      transition: opacity 2s linear;
      opacity: 0.5;
    }
    .top-image.fadeout {
      opacity: 0;
    }
    .top-image.fadein {
      opacity: 0.5;
      transition: opacity 10s linear;
    }

    .controls {
      /* position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%); */
      display: flex;
      gap: 12px;
      padding: 10px 16px;
      border-radius: 12px;
      background: rgba(0, 0, 0, 0.7);
      color: #fff;
      font-size: 14px;
      margin-bottom: 20px; /* so it doesn’t touch the image */
      opacity: 0.5;
    }

    .controls label {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .controls input[type="time"] {
      padding: 4px 6px;
      border-radius: 6px;
      border: 1px solid #555;
      background: #111;
      color: #fff;
      font-size: 14px;
    }

    .controls.fadeout {
      opacity: 0;
      transition: opacity 2s linear;
    }
  </style>
</head>
<body>
  <img src="meditation.png" alt="Meditation Image" class="top-image">

  <div class="controls">
    <label>
      Startup
      <input id="startupTime" type="time" step="60" value="00:01">
    </label>

    <label>
      Meditation
      <input id="meditationTime" type="time" step="60" value="00:25">
    </label>

    <label>
      Interval
      <input id="intervalTime" type="time" step="60" value="00:01">
    </label>

    <label>
      Walking
      <input id="walkingTime" type="time" step="60" value="00:05">
    </label>
  </div>

  <button id="startBtn">Start</button>

  <!-- Audio files -->
  <audio id="meditationStart" src="bell_big_starting.mp3" preload="auto"></audio>
  <audio id="meditationEnd"   src="bell_big_ending.mp3"   preload="auto"></audio>
  <audio id="walkStart"       src="bell_medium.mp3"       preload="auto"></audio>
  <audio id="walkEnd"         src="bell_medium_ending.mp3"         preload="auto"></audio>

  <script>
    const MIN = 60_000; // 1 minute in ms

    function getTimeMinutes(id, fallbackMinutes) {
      const el = document.getElementById(id);
      if (!el || !el.value) return fallbackMinutes;

      const [hh, mm] = el.value.split(":").map(Number);
      if (!Number.isFinite(hh) || !Number.isFinite(mm)) {
        return fallbackMinutes;
      }
      return hh * 60 + mm; // convert hours + minutes to total minutes
    }

    function buildSchedule() {

      // const tStartup = 1
      // const tMeditation = 15
      // const tIntervall = 1
      // const tWalking = 2

      const tStartup    = getTimeMinutes("startupTime",    1);
      const tMeditation = getTimeMinutes("meditationTime", 15);
      const tIntervall  = getTimeMinutes("intervalTime",   1);
      const tWalking    = getTimeMinutes("walkingTime",    2);

      const tStartMeditation1 = tStartup
      const tEndMeditation1 = tStartMeditation1 + tMeditation
      const tStartWalking = tEndMeditation1 + tIntervall
      const tEndWalking = tStartWalking + tWalking
      const tStartMeditation2 = tEndWalking + tIntervall
      const tEndMeditation2 = tStartMeditation2 + tMeditation

      const events = [
        { tMin:  tStartMeditation1, kind: "meditation-start" },
        { tMin:  tEndMeditation1, kind: "meditation-end"   },
        { tMin:  tStartWalking, kind: "walk-start"       },
        { tMin:  tEndWalking, kind: "walk-end"         },
        { tMin:  tStartMeditation2, kind: "meditation-start" },
        { tMin:  tEndMeditation2, kind: "meditation-end"   },
      ];

      // Convert to milliseconds from start
      return events
        .map(e => ({ ...e, dueMs: e.tMin * MIN }))
        .sort((a, b) => a.dueMs - b.dueMs);
    }

    const startBtn = document.getElementById("startBtn");

    const audios = {
      "meditation-start": document.getElementById("meditationStart"),
      "meditation-end":   document.getElementById("meditationEnd"),
      "walk-start":       document.getElementById("walkStart"),
      "walk-end":         document.getElementById("walkEnd"),
    };

    function playBell(kind) {
      const audio = audios[kind];
      if (!audio) return;
      // Restart from the beginning each time
      audio.currentTime = 0;
      audio.play().catch(err => {
        // In case autoplay policy complains, we just log it.
        console.error("Audio play failed:", err);
      });
    }

    startBtn.addEventListener("click", () => {
      startBtn.disabled = true;
      document.querySelector("button").classList.add("fadeout");
      startBtn.textContent = "Enjoy…";
      document.querySelector(".top-image").classList.add("fadeout");
      document.querySelector(".controls").classList.add("fadeout");

      const schedule = buildSchedule();
      const startTime = performance.now();

      // Set one timeout per event; avoids the “two bells at once” bug from
      // overlapping interval checks and makes timing very straightforward.
      schedule.forEach((event, index) => {
        const delay = event.dueMs - (performance.now() - startTime);

        // Guard: if delay is negative (e.g., very small timer drift), set to 0
        const safeDelay = Math.max(0, delay);

        setTimeout(() => {
          const now = performance.now();
          const elapsed = (now - startTime) / 1000;
          const scheduled = event.tMin * 60;
          const drift = (elapsed - scheduled).toFixed(3);

          console.log(
            `EVENT ${event.kind} | scheduled ${scheduled}s | actual ${elapsed.toFixed(3)}s | drift ${drift}s | ${new Date().toLocaleTimeString()}`
          );
          playBell(event.kind);

          // If this was the last event, update button text
          if (index === schedule.length - 1) {
            document.querySelector("button").classList.remove("fadeout");
            document.querySelector("button").classList.add("fadein");
            startBtn.textContent = "You did well, my young Padawan";
            document.querySelector(".top-image").classList.add("fadein");

          }
        }, safeDelay);
      });

      // Optional: fire the very first event immediately if it's at t=0
      const first = schedule[0];
      if (first && first.dueMs === 0) {
        playBell(first.kind);
      }
    });
  </script>
</body>
</html>
